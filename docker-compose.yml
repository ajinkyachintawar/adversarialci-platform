services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: "8000"
    volumes:
      # Mount source for hot reload (dev only)
      - .:/app
      # Keep the container's installed packages
      - /app/.venv
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload
