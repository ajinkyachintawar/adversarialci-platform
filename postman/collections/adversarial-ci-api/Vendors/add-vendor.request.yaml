$kind: http-request
name: 'Add Vendor (Admin)'
method: POST
url: '{{baseUrl}}/api/vendors'
order: 3000
headers:
  - key: x-admin-key
    value: '{{adminKey}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "ExampleVendor",
      "vertical": "database",
      "pricing_url": "https://example.com/pricing",
      "github_repo": "https://github.com/example/repo",
      "blog_rss": "https://example.com/rss"
    }
